name = "remote-to-open-something"   # ← 改成和 Cloudflare 后台一致
main = "index.js"
compatibility_date = "2024-01-01"

# Durable Objects 声明
[[durable_objects.bindings]]
name = "RELAY"
class_name = "RelaySession"

# 免费套餐必须使用 new_sqlite_classes（不能用 new_classes）
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RelaySession"]

# 环境变量（敏感值用 wrangler secret put SECRET 设置，不要写在这里）
# [vars]
# SECRET = "在命令行用 wrangler secret put SECRET 设置"
